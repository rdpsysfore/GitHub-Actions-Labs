name: Workflow Input Lab

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - uat
          - prod

jobs:
  show-input:
    runs-on: ubuntu-latest

    steps:
      - name: Display Selected Environment
        run: |
          echo "Selected Environment:"
          echo "${{ github.event.inputs.environment }}"
