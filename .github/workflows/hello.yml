name: Artifact Upload Lab

on:
  workflow_dispatch:

jobs:
  upload-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Create File
        run: |
          echo "Hello from GitHub Actions" > report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-report
          path: report.txt
