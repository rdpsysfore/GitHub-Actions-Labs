name: Artifact Upload Lab

on:
  workflow_dispatch:

jobs:
  upload-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Create Folder
        run: |
          mkdir reports
          echo "Report1" > reports/report1.txt
          echo "Report2" > reports/report2.txt

      - name: Upload Folder
        uses: actions/upload-artifact@v4
        with:
          name: reports-folder
          path: reports/
