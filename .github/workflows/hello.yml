name: Artifact Download Lab

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Create File
        run: |
          echo "GitHub Actions Artifact" > output.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-file
          path: output.txt

  consume:
    needs: create
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-file

      - name: Read File
        run: |
          cat output.txt
