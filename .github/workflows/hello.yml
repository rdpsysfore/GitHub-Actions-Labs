name: Multi Environment

on:
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    environment:
      name: dev

    steps:
      - run: echo "Deploy DEV"

  deploy-prod:
    needs: deploy-dev

    runs-on: ubuntu-latest

    environment:
      name: prod

    steps:
      - run: echo "Deploy PROD"
