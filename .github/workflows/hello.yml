name: Checkout Lab

on:
  workflow_dispatch:

jobs:
  checkout-test:
    runs-on: ubuntu-latest

    steps:
      - name: Show Files Before Checkout
        run: |
          echo "Before Checkout"
          pwd
          ls -la

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Files After Checkout
        run: |
          echo "After Checkout"
          pwd
          ls -la
