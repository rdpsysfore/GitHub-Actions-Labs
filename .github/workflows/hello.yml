name: Multi Matrix Lab

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

        java:
          - 17
          - 21

    runs-on: ${{ matrix.os }}

    steps:
      - run: |
          echo "OS: ${{ matrix.os }}"
          echo "Java: ${{ matrix.java }}"
